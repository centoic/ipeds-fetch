version: 2
updates:
    - package-ecosystem: "npm"
      directory: "/"
      schedule:
          interval: "weekly"
          day: "monday"
          time: "09:00"
          timezone: "America/Los_Angeles"
      # No groups — each dependency opens its own PR with its own clock.
      ignore:
          - dependency-name: "*"
            update-types: ["version-update:semver-major"]
      open-pull-requests-limit: 10
