version: 2
updates:
    - package-ecosystem: "npm"
      directory: "/"
      schedule:
          interval: "weekly"
          day: "monday"
          time: "09:00"
          timezone: "America/Los_Angeles"
      groups:
          patch-updates:
              patterns:
                  - "*"
              update-types:
                  - "patch"
          minor-updates:
              patterns:
                  - "*"
              update-types:
                  - "minor"
      ignore:
          - dependency-name: "*"
            update-types: ["version-update:semver-major"]
      open-pull-requests-limit: 5
